name: Integration Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Allowed to fail — requires GCP_SA_KEY secret which may not be configured
    continue-on-error: true
    env:
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION || 'global' }}
      GOOGLE_GENAI_USE_VERTEXAI: "true"
      EXPENSE_THRESHOLD: "100.00"
      EXPENSE_MODEL_NAME: "gemini-3.1-flash-lite"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        continue-on-error: true
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Run integration tests
        if: steps.auth.outcome == 'success'
        run: uv run pytest tests/integration -v --tb=short

      - name: Skip notice (no GCP credentials)
        if: steps.auth.outcome != 'success'
        run: echo "Skipping integration tests — GCP_SA_KEY secret not configured. See README for setup instructions."
