name: Eval

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    name: LLM-as-Judge Evaluation
    runs-on: ubuntu-latest
    # Skip entirely when GCP credentials are not configured
    if: vars.GOOGLE_CLOUD_PROJECT != '' || secrets.GCP_SA_KEY != ''
    env:
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION || 'global' }}
      GOOGLE_GENAI_USE_VERTEXAI: "true"
      EXPENSE_THRESHOLD: "100.00"
      EXPENSE_MODEL_NAME: "gemini-3.1-flash-lite"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install dependencies (including eval extras)
        run: uv sync --extra eval --group dev --frozen

      - name: Generate eval traces
        run: make generate-traces

      - name: Grade traces with LLM-as-judge
        run: make grade

      - name: Upload grade results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-grade-results-${{ github.sha }}
          path: artifacts/grade_results/
          retention-days: 30
